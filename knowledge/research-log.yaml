  - knowledge/notes/06-mcp-extensions-and-enterprise.md
  - knowledge/notes/07-installation-and-deployment.md
  - knowledge/notes/08-authentication.md
  key_findings:
  - 'Antigravity 2.0 is currently distributed as Gemini CLI (NPM: @google/gemini-cli).'
  - 'Latest version: v0.44.0-nightly.20260518 (published 2026-05-18).'
  - 'Weekly release cadence with promotion flow: main → nightly → preview → stable.'
  - 'Architecture: monorepo with two NPM packages (cli + core) plus tools in packages/core/src/tools/.'
  - Supports stdio, HTTP, and SSE transports for MCP servers.
  - Extensions support prompts, MCP servers, and custom commands via TOML.
  - Trusted Folders and Checkpointing are security features disabled by default.
  - Enterprise deployment supports system-level configuration, tool allowlisting,
    and custom telemetry.
- date: '2026-05-20'
  type: deep-research
  description: 'Gap-fill research: themes, token caching, telemetry, FAQ, memory tool,
    extension releasing.'
  sources_fetched:
  - https://google-gemini.github.io/gemini-cli/docs/cli/themes.html
  - https://google-gemini.github.io/gemini-cli/docs/cli/token-caching.html
  - https://google-gemini.github.io/gemini-cli/docs/cli/telemetry.html
  - https://google-gemini.github.io/gemini-cli/docs/faq.html
  - https://google-gemini.github.io/gemini-cli/docs/tools/memory.html
  - https://google-gemini.github.io/gemini-cli/docs/extensions/extension-releasing.html
  - https://google-gemini.github.io/gemini-cli/docs/npm.html
  notes_created:
  - knowledge/notes/12-themes-and-customization.md
  - knowledge/notes/13-token-caching.md
  - knowledge/notes/14-telemetry-and-observability.md
  - knowledge/notes/15-faq.md
  - knowledge/notes/16-memory-tool.md
  - knowledge/notes/17-extension-releasing.md
  key_findings:
  - 12 built-in themes (6 dark + 6 light) with full custom theme support via settings.json.
  - Token caching works for API key and Vertex AI auth; not supported for OAuth.
  - Telemetry uses OpenTelemetry with Google Cloud, Jaeger, Prometheus, and Datadog
    support.
  - Custom metrics include command execution, tool usage, and chat compression counters.
  - GenAI semantic conventions compliant for token usage and operation duration.
  - Memory tool persists facts to ~/.gemini/GEMINI.md for cross-session recall.
  - Extensions distribute via git repos or GitHub releases; git repo is the recommended
    approach.
  - FAQ covers API 429 errors, Windows chmod issues, and Pro/Ultra subscription limits.
