  - https://google-gemini.github.io/gemini-cli/docs/tools/web-search.html
  - https://google-gemini.github.io/gemini-cli/docs/tools/multi-file.html
  - https://google-gemini.github.io/gemini-cli/docs/npm.html
  - https://google-gemini.github.io/gemini-cli/docs/tos-privacy.html
  - https://api.github.com/repos/google-gemini/gemini-cli/releases?per_page=10
  notes_created:
  - knowledge/notes/18-troubleshooting.md
  - knowledge/notes/19-practical-examples.md
  - knowledge/notes/20-mcp-tutorial.md
  - knowledge/notes/21-shell-tool.md
  - knowledge/notes/22-release-notes-v042.md
  - knowledge/notes/23-npm-packages.md
  key_findings:
  - Troubleshooting guide covers auth errors, EADDRINUSE, SSL cert issues, .env exclusions,
    5 exit codes (41-53), and debugging tips.
  - 'Four practical examples: photo renaming, repo explanation, spreadsheet merge,
    and unit testing.'
  - MCP tutorial walks through Docker-based GitHub MCP server setup with PAT authentication.
  - Shell tool has extensive command restriction options via core/exclude allowlist/blocklist
    patterns.
  - 'v0.42.0 stable release includes 30+ changes: SEA support, auto-update channel
    safety, /exit --delete flag, workspace trust, ACP modularization.'
  - v0.43.0-preview.0 includes RAG snippets, ACP gateway fixes, NO_PROXY support,
    NixOS sandbox fixes.
  - 'v0.43.0-preview.1 is a cherry-pick patch for issue #27073.'
  - 'NPM workspaces manage two packages: @google/gemini-cli (UI + bundle) and @google/gemini-cli-core
    (API core).'
  - TOS/Privacy maps four auth methods to different legal frameworks (Google ToS,
    Cloud Terms, Gemini API Terms).
- date: '2026-05-20'
  type: deep-research
  description: 'Gap-fill research: quotas/pricing note, Google Developers Blog seed
    source investigation (5 blog posts on Antigravity platform, ADK, Gemini CLI transition,
    Gemini 3 Flash/Pro integration, and agent framework examples), changelog review,
    and new backlog entries.'
  sources_fetched:
  - https://google-gemini.github.io/gemini-cli/docs/quota-and-pricing.html
  - https://developers.googleblog.com/an-important-update-transitioning-gemini-cli-to-antigravity-cli/
  - https://developers.googleblog.com/gemini-3-flash-is-now-available-in-gemini-cli/
  - https://developers.googleblog.com/5-things-to-try-with-gemini-3-pro-in-gemini-cli/
  - https://developers.googleblog.com/real-world-agent-examples-with-gemini-3/
  - https://developers.googleblog.com/build-with-google-antigravity-our-new-agentic-development-platform/
  - https://developers.googleblog.com/build-long-running-ai-agents-that-pause-resume-and-never-lose-context-with-adk/
  - https://google-gemini.github.io/gemini-cli/docs/changelogs/
  - https://api.github.com/repos/google-gemini/gemini-cli/releases
  - https://api.github.com/repos/google-gemini/gemini-cli/tags
  notes_created:
  - knowledge/notes/24-quotas-and-pricing.md
  - knowledge/notes/25-google-developers-blog-announcements.md
  - knowledge/notes/26-google-developers-blog-antigravity-platform.md
  key_findings:
  - Quotas/pricing page documented with free tier, paid tier (Standard/Enterprise),
    and pay-as-you-go options across all auth methods.
  - Google announced transition from Gemini CLI to Antigravity CLI with June 18, 2026
    sunset date for non-enterprise users.
  - Google Antigravity platform includes Editor View (AI IDE) and Manager Surface
    (multi-agent orchestration) with Artifacts verification system.
  - Gemini 3 Flash achieves 78% SWE-bench Verified score, available at less than quarter
    cost of Gemini 3 Pro.
  - Gemini 3 Pro in Gemini CLI: 5 practical use cases including code review, refactoring,
      documentation, and Cloud Run debugging.
  - Six framework integrations showcased: ADK, Agno, Browser Use, Eigent, Letta, mem0.
  - ADK tutorial covers durable memory schemas, event-driven dormancy gates, and multi-agent
    delegation for long-running agents.
  - Changelog directory has weekly updates from v0.4.0 to v0.7.0 (last entry 2025-09-22).
  - No new releases since v0.43.0-preview.1 (2026-05-19).
  - Reddit seed sources require captcha-protected pages; YouTube channel listing requires
    JS rendering.
- date: '2026-05-20'
  type: deep-research
  description: 'Gap-fill research: file system tools documentation (6 tools), release
    process/cadence documentation, and ADK quickstart site overview.'
  sources_fetched:
  - https://google-gemini.github.io/gemini-cli/docs/tools/file-system.html
  - https://google-gemini.github.io/gemini-cli/docs/releases.html
  - https://adk.dev/get-started/
  - https://api.github.com/repos/google-gemini/gemini-cli/releases
  notes_created:
  - knowledge/notes/27-file-system-tools.md
  - knowledge/notes/28-release-process.md
  key_findings:
  - 'File system tools include 6 operations: list_directory, read_file, write_file,
    glob, search_file_content, and replace.'
  - replace tool includes multi-stage edit correction for robustness.
  - 'Release cadence follows semver with 3-tier promotion: nightly -> preview -> stable.'
  - Weekly Tuesday releases at ~2000 UTC with 1-week lag from main to stable.
  - 'Dual artifact distribution: NPM packages and bundled gemini.js for npx.'
  - ADK site offers Python, TypeScript, and Go quickstarts.
  - No new releases since v0.43.0-preview.1 (2026-05-19).
- date: '2026-05-20'
  type: deep-research
  description: 'Gap-fill research: ADK 2.0 GA release, Google Cloud Data Platform
    Extensions, and article backlog update.'
  sources_fetched:
  - https://adk.dev/2.0/
  - https://adk.dev/get-started/about/
  - https://adk.dev/graphs/routes/
  - https://adk.dev/workflows/collaboration/
  - https://adk.dev/workflows/patterns/
  - https://adk.dev/agents/llm-agents/
  - https://adk.dev/agents/config/
  - https://cloud.google.com/blog/products/databases/gemini-cli-extensions-for-google-data-cloud
  notes_created:
  - knowledge/notes/29-adk-2.0-ga-release.md
  - knowledge/notes/30-google-cloud-data-platform-extensions.md
  key_findings:
  - ADK Python 2.0.0 GA released May 19, 2026 with graph-based workflows, dynamic
    workflows, and collaborative workflows.
  - Three workflow paradigms: deterministic graph routes, iterative dynamic logic,
    and coordinator-subagent delegation.
  - Core primitives expanded: Agent, Tool, Callbacks, Session, Memory, Artifact,
    Code Execution, Planning, Models, Event, Runner.
  - Multi-language support: Python, TypeScript, Go, Java, Kotlin.
  - Google Cloud Data Platform extensions include 9 database extensions (AlloyDB,
    BigQuery, Cloud SQL, Dataplex, Firestore, Looker, MySQL, Postgres, Spanner,
    SQL Server) plus MCP Toolbox for 30+ data sources.
  - Extensions announced via Google Cloud blog by Mandava and Karmarkar on 2025-09-24.

