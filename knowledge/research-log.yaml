- date: '2026-05-21'
  type: deep-research
  description: 'Scheduled gap-fill research: web fetch/search tools, multi-file read
    tool, and terms/privacy documentation.'
  sources_fetched:
  - https://google-gemini.github.io/gemini-cli/docs/tools/web-fetch.html
  - https://google-gemini.github.io/gemini-cli/docs/tools/web-search.html
  - https://google-gemini.github.io/gemini-cli/docs/tools/multi-file.html
  - https://google-gemini.github.io/gemini-cli/docs/tos-privacy.html
  notes_created:
  - knowledge/notes/31-web-fetch-and-search-tools.md
  - knowledge/notes/32-multi-file-read-tool.md
  - knowledge/notes/33-terms-and-privacy.md
  key_findings:
  - web_fetch processes prompts containing up to 20 URLs and can fall back from
    Gemini API URL context to local fetching.
  - google_web_search sends a query through Gemini API and returns a synthesized
    search summary with citations rather than raw search results.
  - read_many_files aggregates path and glob matches, respects default excludes
    and .gitignore by default, and only includes media/PDF files when targeted.
  - Terms, privacy notices, model-training use, and usage statistics behavior vary
    by authentication method and account type.
