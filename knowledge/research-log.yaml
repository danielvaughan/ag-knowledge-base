- date: '2026-05-21'
  type: deep-research
  description: 'Scheduled gap-fill research: custom commands, headless and
    machine-readable CLI use, and latest v0.44 nightly release coverage.'
  sources_fetched:
  - https://google-gemini.github.io/gemini-cli/docs/cli/custom-commands.html
  - https://google-gemini.github.io/gemini-cli/docs/cli/commands.html
  - https://google-gemini.github.io/gemini-cli/docs/get-started/configuration.html
  - https://google-gemini.github.io/gemini-cli/docs/get-started/authentication.html
  - https://google-gemini.github.io/gemini-cli/docs/changelogs/
  - https://github.com/google-gemini/gemini-cli/releases/tag/v0.44.0-nightly.20260521.g57c42a5c4
  notes_created:
  - knowledge/notes/34-custom-commands.md
  - knowledge/notes/35-headless-and-machine-readable-cli.md
  - knowledge/notes/36-release-notes-v044-nightly-20260521.md
  key_findings:
  - Custom commands are TOML-backed global or project slash commands, with
    project commands taking precedence over user commands.
  - Custom commands support dynamic shell and file injection; shell injections
    require confirmation and the latest observed nightly includes a path
    traversal fix for command file injection.
  - Headless use combines environment-based authentication, positional prompts,
    JSON output, and non-interactive exit-code handling.
  - The latest observed release is v0.44.0-nightly.20260521.g57c42a5c4,
    published 2026-05-21 as a prerelease.

