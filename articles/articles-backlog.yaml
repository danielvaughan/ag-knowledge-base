# Added: 2026-05-20 research cycle (cycle 6)
  - title: "Checkpointing — Undo Tool Execution Safely"
    slug: "checkpointing-undo-tool-execution"
    priority: medium
    description: "Documentation of the Checkpointing feature that automatically saves a snapshot of your project's state before any file modifications by AI tools. Covers shadow Git snapshots, conversation history preservation, the /restore command, enabling via CLI flag or settings.json, and storage locations."
    source_urls:
      - "https://google-gemini.github.io/gemini-cli/docs/cli/checkpointing.html"
    key_points:
      - Automatically creates checkpoints before file-modifying tool calls
      - Shadow Git repository in ~/.gemini/history/<project_hash>
      - /restore command lists and reverts to checkpoints
      - Disabled by default; enable via --checkpointing flag or settings.json
      - Stored locally; no data leaves the machine
    added: "2026-05-20"

  - title: "Trusted Folders — Enterprise Workspace Security"
    slug: "trusted-folders-enterprise-security"
    priority: high
    description: "Documentation of the Trusted Folders security feature that controls which projects can use full Gemini CLI capabilities. Covers the trust dialog, safe mode restrictions for untrusted workspaces, management commands, and advanced trust check process. Critical for enterprise deployments."
    source_urls:
      - "https://google-gemini.github.io/gemini-cli/docs/cli/trusted-folders.html"
    key_points:
      - Trust dialog on first run with three choices: trust, trust parent, don't trust
      - Untrusted mode disables workspace settings, env vars, extension management, auto-acceptance, and memory loading
      - Central trust rules file at ~/.gemini/trustedFolders.json
      - IDE trust signal takes priority over local trust file
      - Managed via /permissions command
    added: "2026-05-20"

