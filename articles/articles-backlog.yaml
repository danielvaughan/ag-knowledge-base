  - title: "Web Fetch and Web Search Tools Deep Dive"
    slug: "web-fetch-web-search-tools"
    priority: medium
    description: "Detailed documentation of web_fetch and google_web_search tools including arguments, examples, important notes, and URL processing behavior. Covers multi-URL support (up to 20), Gemini API urlContext processing, and local machine fallback."
    source_urls:
      - "https://google-gemini.github.io/gemini-cli/docs/tools/web-fetch.html"
      - "https://google-gemini.github.io/gemini-cli/docs/tools/web-search.html"
    key_points:
      - web_fetch processes up to 20 URLs per prompt
      - google_web_search returns summaries with citations, not raw results
      - Fallback to local machine fetch if API cannot access URL
      - Prompt must contain at least one URL starting with http:// or https://
    added: "2026-05-20"

  - title: "Multi-File Read Tool Deep Dive"
    slug: "multi-file-read-tool"
    priority: medium
    description: "Detailed documentation of read_many_files tool covering glob patterns, binary file handling (image/PDF/audio/video as base64), default excludes, and include/exclude pattern mechanics."
    source_urls:
      - "https://google-gemini.github.io/gemini-cli/docs/tools/multi-file.html"
    key_points:
      - read_many_files concatenates text files with file separators
      - Image/PDF/audio/video returned as base64 when explicitly requested
      - Binary detection via null byte examination
      - Default excludes (node_modules, .git) can be overridden with useDefaultExcludes
    added: "2026-05-20"

