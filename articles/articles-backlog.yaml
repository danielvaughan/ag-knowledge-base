  - title: "Terms of Service and Privacy for Gemini CLI"
    slug: "tos-privacy"
    priority: medium
    description: "Comprehensive mapping of Terms of Service and Privacy Notices for different authentication methods: Gemini Code Assist (Individual, Standard/Enterprise), Gemini Developer API (Unpaid/Paid), and Vertex AI GenAI API."
    source_urls:
      - "https://google-gemini.github.io/gemini-cli/docs/tos-privacy.html"
      - "https://google-gemini.github.io/gemini-cli/docs/quota-and-pricing.html"
    key_points:
      - Four authentication methods each map to different ToS and Privacy policies
      - Individual users: Google ToS + Gemini Code Assist Privacy Notice
      - Standard/Enterprise: Google Cloud Terms + Standard/Enterprise Privacy Notice
